<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Foundation OS — Monitor Dashboard</title>

    <!-- Google Fonts (Figtree + JetBrains Mono) — meme stack que Storybook -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
    />

    <!--
      Tokens Void Glass — source unique du DS (@foundation-os/design-system).
      Chemin relatif depuis docs/monitor/ vers modules/design-system/tokens/build/.
      Le fichier est genere par `npm run build:tokens` dans le module DS ;
      si absent, lance `cd modules/design-system && npm run build:tokens`.
    -->
    <link
      rel="stylesheet"
      href="../../modules/design-system/tokens/build/tokens.css"
    />

    <!-- Styles dashboard specifiques -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="root"></div>

    <!--
      Data source de verite — hand-editable, update via /session-end etape 6.5.
      defer pour garantir l'ordre : data.js AVANT render.js, render apres parsing DOM.
    -->
    <script src="data.js" defer></script>
    <script src="render.js" defer></script>
  </body>
</html>
