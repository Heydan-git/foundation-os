name: 🌍 Foundation OS Global Production Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
        - staging
        - production
        - canary

env:
  NODE_VERSION: '18.x'
  PNPM_VERSION: '8.x'

jobs:
  # ================================
  # QUALITY GATES & SECURITY
  # ================================

  code-quality:
    name: 🔍 Code Quality & Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: TypeScript compilation
        run: npm run build

      - name: ESLint validation
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit
        env:
          CI: true

      - name: Security scan (Snyk)
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

      - name: Dependency vulnerability check
        run: npm audit --audit-level=moderate

  # ================================
  # BUILD OPTIMIZATION
  # ================================

  build-optimization:
    name: 🏗️ Build & Optimization
    runs-on: ubuntu-latest
    needs: [code-quality]
    outputs:
      build-size: ${{ steps.bundle-analyzer.outputs.size }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Production build
        run: npm run build
        env:
          NODE_ENV: production
          VITE_APP_ENV: production

      - name: Bundle size analysis
        id: bundle-analyzer
        run: |
          npx vite-bundle-analyzer dist --json > bundle-report.json
          SIZE=$(cat bundle-report.json | jq '.assets[0].size')
          echo "size=$SIZE" >> $GITHUB_OUTPUT

      - name: Validate bundle size
        run: |
          if [ ${{ steps.bundle-analyzer.outputs.size }} -gt 5000000 ]; then
            echo "Bundle size exceeds 5MB limit"
            exit 1
          fi

      - name: Compress assets
        run: |
          cd dist
          find . -name "*.js" -exec gzip -k {} \;
          find . -name "*.css" -exec gzip -k {} \;

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7

  # ================================
  # MULTI-REGION DEPLOYMENT
  # ================================

  deploy-us-east:
    name: 🇺🇸 Deploy US-East (Primary)
    runs-on: ubuntu-latest
    needs: [build-optimization]
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/

      - name: Deploy to Vercel US-East
        uses: vercel/action@v1
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-args: '--prod --regions iad1'
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Update DNS (US-East)
        run: |
          curl -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/dns_records" \
               -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
               -H "Content-Type: application/json" \
               --data '{"type":"CNAME","name":"us-east","content":"${{ env.VERCEL_URL }}","ttl":300}'

  deploy-eu-west:
    name: 🇪🇺 Deploy EU-West (GDPR)
    runs-on: ubuntu-latest
    needs: [build-optimization]
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/

      - name: Deploy to Vercel EU-West
        uses: vercel/action@v1
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-args: '--prod --regions dub1'
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_EU }}

      - name: GDPR compliance check
        run: |
          echo "Validating GDPR compliance for EU deployment"
          # Add GDPR validation logic here

  deploy-asia-pacific:
    name: 🌏 Deploy Asia-Pacific
    runs-on: ubuntu-latest
    needs: [build-optimization]
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/

      - name: Deploy to Vercel Asia-Pacific
        uses: vercel/action@v1
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-args: '--prod --regions sin1'
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_APAC }}

  # ================================
  # GLOBAL CDN & OPTIMIZATION
  # ================================

  cdn-optimization:
    name: 🚀 CDN & Global Optimization
    runs-on: ubuntu-latest
    needs: [deploy-us-east, deploy-eu-west, deploy-asia-pacific]
    steps:
      - name: Purge CloudFlare cache
        run: |
          curl -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
               -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
               -H "Content-Type: application/json" \
               --data '{"purge_everything":true}'

      - name: Enable CloudFlare features
        run: |
          # Enable Brotli compression
          curl -X PATCH "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/settings/brotli" \
               -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
               -H "Content-Type: application/json" \
               --data '{"value":"on"}'

          # Enable Auto Minify
          curl -X PATCH "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/settings/minify" \
               -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
               -H "Content-Type: application/json" \
               --data '{"value":{"css":"on","html":"on","js":"on"}}'

  # ================================
  # VALIDATION & MONITORING
  # ================================

  global-validation:
    name: ✅ Global Deployment Validation
    runs-on: ubuntu-latest
    needs: [cdn-optimization]
    steps:
      - name: Health check US-East
        run: |
          curl -f https://foundation-os.com/health || exit 1

      - name: Health check EU-West
        run: |
          curl -f https://eu.foundation-os.com/health || exit 1

      - name: Health check Asia-Pacific
        run: |
          curl -f https://ap.foundation-os.com/health || exit 1

      - name: Performance validation
        run: |
          # Lighthouse CI performance checks
          npm install -g @lhci/cli@0.12.x
          lhci autorun --upload.target=temporary-public-storage
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Security headers validation
        run: |
          curl -I https://foundation-os.com | grep -E "(X-Content-Type-Options|X-Frame-Options|X-XSS-Protection)"

  # ================================
  # MONITORING SETUP
  # ================================

  monitoring-setup:
    name: 📊 Monitoring & Alerting Setup
    runs-on: ubuntu-latest
    needs: [global-validation]
    steps:
      - name: Configure DataDog monitoring
        run: |
          curl -X POST "https://api.datadoghq.com/api/v1/monitor" \
               -H "Content-Type: application/json" \
               -H "DD-API-KEY: ${{ secrets.DATADOG_API_KEY }}" \
               -H "DD-APPLICATION-KEY: ${{ secrets.DATADOG_APP_KEY }}" \
               -d '{
                 "type": "metric alert",
                 "query": "avg(last_5m):avg:system.load.1{host:foundation-os} > 0.8",
                 "name": "Foundation OS High Load Alert",
                 "message": "Foundation OS is experiencing high load",
                 "tags": ["team:foundation-os", "env:production"],
                 "options": {
                   "thresholds": {
                     "critical": 0.8,
                     "warning": 0.6
                   },
                   "notify_audit": false,
                   "require_full_window": false,
                   "notify_no_data": true,
                   "renotify_interval": 0
                 }
               }'

      - name: Setup New Relic alerts
        run: |
          curl -X POST 'https://api.newrelic.com/v2/alerts_policies.json' \
               -H "Api-Key: ${{ secrets.NEW_RELIC_API_KEY }}" \
               -H 'Content-Type: application/json' \
               -d '{
                 "policy": {
                   "name": "Foundation OS Production Alerts",
                   "incident_preference": "PER_CONDITION_AND_TARGET"
                 }
               }'

  # ================================
  # NOTIFICATION & REPORTING
  # ================================

  deployment-notification:
    name: 📢 Deployment Notification
    runs-on: ubuntu-latest
    needs: [monitoring-setup]
    if: always()
    steps:
      - name: Deployment success notification
        if: success()
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
               -H 'Content-Type: application/json' \
               -d '{
                 "text": "🚀 Foundation OS Global Deployment Successful!",
                 "attachments": [
                   {
                     "color": "good",
                     "fields": [
                       {
                         "title": "Environment",
                         "value": "Production Global",
                         "short": true
                       },
                       {
                         "title": "Commit",
                         "value": "${{ github.sha }}",
                         "short": true
                       },
                       {
                         "title": "Regions Deployed",
                         "value": "US-East, EU-West, Asia-Pacific",
                         "short": false
                       }
                     ]
                   }
                 ]
               }'

      - name: Deployment failure notification
        if: failure()
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
               -H 'Content-Type: application/json' \
               -d '{
                 "text": "❌ Foundation OS Global Deployment Failed!",
                 "attachments": [
                   {
                     "color": "danger",
                     "fields": [
                       {
                         "title": "Environment",
                         "value": "Production Global",
                         "short": true
                       },
                       {
                         "title": "Commit",
                         "value": "${{ github.sha }}",
                         "short": true
                       },
                       {
                         "title": "Action Required",
                         "value": "Check GitHub Actions logs and rollback if necessary",
                         "short": false
                       }
                     ]
                   }
                 ]
               }'