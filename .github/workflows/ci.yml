name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Build Design System
        run: npm run build -w modules/design-system

      - name: TypeScript check
        working-directory: modules/app
        run: npx tsc --noEmit

      - name: Build App
        run: npm run build -w modules/app

      - name: Tests App
        working-directory: modules/app
        run: npx vitest run

      - name: Tests Design System
        working-directory: modules/design-system
        run: npx vitest run

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: A11y Gate (Playwright + axe)
        working-directory: modules/design-system
        run: npm run test:e2e
        env:
          CI: true
